<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>りかテスト 〜身近な生物〜</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=RocknRoll+One&family=Yusei+Magic&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f0f7ed; --paper-deep: #d8ebd0; --ink: #1f3a1d;
  --leaf: #4a8146; --leaf-light: #7bbf75; --berry: #d8434a;
  --sky: #5a9fc7; --sun: #f4c43e; --earth: #b07a3a;
  --shadow: rgba(40, 60, 30, 0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: var(--paper); color: var(--ink);
  min-height: 100vh; -webkit-tap-highlight-color: transparent;
}
body {
  background-image:
    radial-gradient(circle at 10% 20%, rgba(123, 191, 117, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(90, 159, 199, 0.06) 0%, transparent 40%);
}
.app { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }

header { text-align: center; margin-bottom: 24px; padding: 20px 0 12px; }
.title { font-family: 'RocknRoll One', sans-serif; font-size: 32px; color: var(--ink); display: inline-block; }
.title::before { content: '🌿'; margin-right: 8px; }
.title::after { content: '🐛'; margin-left: 8px; }
.subtitle { font-size: 13px; color: #5a6a55; margin-top: 6px; letter-spacing: 0.1em; }

.start-screen {
  background: white; border-radius: 20px; padding: 28px 22px;
  box-shadow: 0 6px 20px var(--shadow); border: 3px solid var(--ink);
}
.start-screen h2 { font-family: 'RocknRoll One', sans-serif; font-size: 22px; margin-bottom: 18px; color: var(--leaf); }

.section-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.section-btn {
  background: var(--paper); border: 2.5px solid var(--ink); border-radius: 14px;
  padding: 14px 16px; font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700; font-size: 16px; color: var(--ink); cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  transition: transform 0.15s, background 0.15s; text-align: left;
}
.section-btn:active { transform: translateY(2px); background: var(--sun); }
.section-btn .num {
  font-family: 'RocknRoll One', sans-serif;
  background: var(--leaf); color: white; width: 32px; height: 32px;
  border-radius: 50%; display: inline-flex; align-items: center;
  justify-content: center; font-size: 16px; margin-right: 10px; flex-shrink: 0;
}
.section-btn .count { font-size: 12px; color: #888; font-weight: 500; }
.section-btn.all { background: var(--ink); color: white; }
.section-btn.all .num { background: var(--berry); }

.mode-toggle {
  display: flex; gap: 6px; margin-bottom: 16px;
  background: var(--paper); padding: 6px; border-radius: 14px;
  border: 2px solid var(--ink); flex-wrap: wrap;
}
.mode-btn {
  flex: 1; min-width: 0; padding: 8px 4px; border: none;
  background: transparent; font-family: 'Zen Maru Gothic', sans-serif;
  font-weight: 700; font-size: 12px; border-radius: 10px;
  cursor: pointer; color: #888; line-height: 1.3;
}
.mode-btn.active { background: var(--ink); color: white; }
.mode-help { font-size: 11px; color: #888; text-align: center; margin-bottom: 16px; }

.handsfree-row {
  background: linear-gradient(135deg, var(--leaf), var(--leaf-light));
  color: white; border-radius: 14px; padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; box-shadow: 0 4px 12px rgba(74, 129, 70, 0.3);
}
.handsfree-row .label { font-weight: 700; font-size: 14px; }
.handsfree-row .desc { font-size: 11px; opacity: 0.9; margin-top: 2px; }
.switch {
  position: relative; width: 52px; height: 28px;
  background: rgba(255,255,255,0.3); border-radius: 14px;
  transition: background 0.2s; flex-shrink: 0;
}
.switch.on { background: white; }
.switch::after {
  content: ''; position: absolute; top: 3px; left: 3px;
  width: 22px; height: 22px; background: white; border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.switch.on::after { transform: translateX(24px); background: var(--leaf); }

.quiz-screen { display: none; }
.quiz-screen.active { display: block; }

.quiz-header {
  background: var(--ink); color: white; border-radius: 16px;
  padding: 14px 18px; margin-bottom: 18px;
  display: flex; justify-content: space-between; align-items: center;
}
.progress { font-family: 'RocknRoll One', sans-serif; font-size: 16px; }
.progress .current { color: var(--sun); font-size: 22px; }
.score-display {
  font-family: 'RocknRoll One', sans-serif; font-size: 15px;
  background: var(--berry); padding: 4px 12px; border-radius: 20px;
}
.progress-bar {
  height: 6px; background: var(--paper-deep);
  border-radius: 3px; overflow: hidden; margin-bottom: 20px;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--leaf), var(--sun));
  transition: width 0.3s; border-radius: 3px;
}

.question-card {
  background: white; border-radius: 20px; padding: 26px 22px;
  box-shadow: 0 6px 20px var(--shadow); border: 3px solid var(--ink);
}
.q-type-badge {
  display: inline-block; background: var(--leaf); color: white;
  font-family: 'RocknRoll One', sans-serif; font-size: 12px;
  padding: 4px 12px; border-radius: 20px; margin-bottom: 14px;
  letter-spacing: 0.1em;
}
.q-type-badge.family { background: var(--leaf-light); }
.q-type-badge.feature { background: var(--earth); }
.q-type-badge.classify { background: var(--sky); }

.question-text { font-size: 19px; line-height: 1.7; font-weight: 500; margin-bottom: 18px; }
.target-name {
  display: inline-block; background: var(--sun); padding: 2px 10px;
  border-radius: 6px; font-weight: 700; border-bottom: 3px solid var(--ink);
  margin: 0 2px;
}
.feature-box {
  background: var(--paper); border-left: 4px solid var(--leaf);
  border-radius: 8px; padding: 12px 14px; margin: 12px 0;
  font-size: 15px; line-height: 1.7;
}
.feature-box ul { list-style: none; padding: 0; }
.feature-box li { padding-left: 16px; position: relative; margin-bottom: 4px; }
.feature-box li::before { content: '・'; position: absolute; left: 0; color: var(--leaf); font-weight: 700; }

.speaker-btn {
  background: var(--leaf); color: white; border: none;
  padding: 10px 16px; border-radius: 22px;
  font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700;
  font-size: 14px; cursor: pointer; display: inline-flex;
  align-items: center; gap: 6px;
}
.speaker-btn:active { transform: translateY(1px); }
.speaker-btn.playing { background: var(--berry); animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

.control-row {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
}
.pause-btn {
  background: white; color: var(--ink); border: 2px solid var(--ink);
  padding: 10px 16px; border-radius: 22px;
  font-family: 'Zen Maru Gothic', sans-serif; font-weight: 700;
  font-size: 14px; cursor: pointer;
}
.pause-btn:active { transform: translateY(1px); }
.pause-btn.resumed {
  background: var(--sun); border-color: var(--ink);
}

.paused-overlay {
  position: fixed; inset: 0;
  background: rgba(31, 58, 29, 0.85);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; backdrop-filter: blur(4px);
}
.paused-overlay.show { display: flex; }
.paused-box {
  background: white; border-radius: 20px; padding: 32px 28px;
  text-align: center; max-width: 320px;
  border: 3px solid var(--ink);
}
.paused-box .pause-icon {
  font-size: 60px; margin-bottom: 12px;
}
.paused-box h2 {
  font-family: 'RocknRoll One', sans-serif;
  font-size: 22px; margin-bottom: 8px; color: var(--ink);
}
.paused-box p {
  font-size: 13px; color: #666; margin-bottom: 20px;
}
.paused-box .action-btn {
  margin-top: 0;
}

.voice-area { text-align: center; padding: 20px 0; }
.mic-btn {
  width: 100px; height: 100px; border-radius: 50%;
  border: 4px solid var(--ink); background: white;
  font-size: 40px; cursor: pointer; transition: all 0.2s;
  display: inline-flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px var(--shadow);
}
.mic-btn:active { transform: scale(0.95); }
.mic-btn.listening {
  background: var(--berry); color: white; border-color: var(--berry);
  animation: micPulse 1.2s infinite;
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(216, 67, 74, 0.5); }
  50% { box-shadow: 0 0 0 20px rgba(216, 67, 74, 0); }
}
.mic-status { margin-top: 12px; font-size: 14px; color: #666; min-height: 22px; font-weight: 700; }
.heard-text {
  margin-top: 8px; padding: 10px 14px;
  background: var(--paper); border-radius: 8px;
  font-size: 16px; font-family: 'Yusei Magic', sans-serif;
  color: var(--ink); min-height: 20px;
}
.heard-text.empty { color: #ccc; }

.answer-input {
  width: 100%; padding: 16px; font-size: 22px;
  font-family: 'Yusei Magic', sans-serif;
  border: 2.5px solid var(--ink); border-radius: 12px;
  background: var(--paper); text-align: center; outline: none;
  transition: border-color 0.2s;
}
.answer-input:focus { border-color: var(--leaf); background: white; }
.answer-input.correct { background: #e8f5e6; border-color: var(--leaf); }
.answer-input.wrong { background: #fce8e9; border-color: var(--berry); }
.hint { text-align: center; font-size: 12px; color: #999; margin-top: 8px; }

.action-btn {
  width: 100%; margin-top: 18px; padding: 16px;
  font-family: 'RocknRoll One', sans-serif; font-size: 18px;
  background: var(--ink); color: white; border: none; border-radius: 14px;
  cursor: pointer; letter-spacing: 0.1em; transition: transform 0.1s;
}
.action-btn:active { transform: translateY(2px); }
.action-btn:disabled { background: #ccc; cursor: not-allowed; }
.action-btn.next { background: var(--leaf); }
.action-btn.retry { background: var(--berry); }
.action-btn.skip {
  background: white; color: #888; border: 2px solid #ddd;
  padding: 10px; font-size: 13px; margin-top: 8px;
}

.feedback { display: none; margin-top: 18px; padding: 16px; border-radius: 12px; text-align: center; }
.feedback.show { display: block; animation: pop 0.3s ease; }
@keyframes pop {
  0% { transform: scale(0.8); opacity: 0; }
  60% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}
.feedback.correct { background: #e8f5e6; border: 2px solid var(--leaf); }
.feedback.wrong { background: #fce8e9; border: 2px solid var(--berry); }
.feedback-icon {
  font-size: 56px; font-weight: 900;
  font-family: 'RocknRoll One', sans-serif;
  line-height: 1; margin-bottom: 6px;
}
.feedback.correct .feedback-icon { color: var(--berry); }
.feedback.wrong .feedback-icon { color: var(--sky); }
.feedback-text { font-size: 14px; color: #555; margin-top: 6px; }
.feedback-answer { font-size: 22px; font-weight: 700; margin-top: 8px; color: var(--ink); }
.feedback-extra { font-size: 12px; color: #888; margin-top: 6px; }
.wiki-link {
  display: inline-block; margin-top: 10px;
  background: var(--leaf); color: white !important;
  padding: 8px 14px; border-radius: 8px;
  text-decoration: none; font-size: 13px; font-weight: 700;
}
.wiki-link:active { transform: translateY(1px); }
.auto-next-info { font-size: 12px; color: #999; margin-top: 10px; text-align: center; }

.result-screen { display: none; }
.result-screen.active { display: block; }
.result-card {
  background: white; border-radius: 20px; padding: 32px 22px;
  box-shadow: 0 6px 20px var(--shadow); border: 3px solid var(--ink);
  text-align: center;
}
.result-emoji { font-size: 80px; margin-bottom: 8px; display: block; }
.result-title { font-family: 'RocknRoll One', sans-serif; font-size: 26px; margin-bottom: 18px; color: var(--ink); }
.result-score { font-family: 'RocknRoll One', sans-serif; font-size: 60px; color: var(--berry); line-height: 1; }
.result-score .denom { font-size: 30px; color: #999; }
.result-percentage { font-size: 16px; color: #666; margin-top: 8px; margin-bottom: 24px; }

.wrong-list {
  background: var(--paper); border-radius: 14px; padding: 16px;
  margin: 20px 0; text-align: left; max-height: 320px; overflow-y: auto;
}
.wrong-list h3 {
  font-family: 'RocknRoll One', sans-serif; font-size: 15px;
  color: var(--berry); margin-bottom: 10px; text-align: center;
}
.wrong-item {
  background: white; border-radius: 10px; padding: 10px 12px;
  margin-bottom: 8px; border-left: 4px solid var(--berry);
  font-size: 13px; line-height: 1.5;
}
.wrong-item:last-child { margin-bottom: 0; }
.wrong-item .q-text { color: #555; }
.wrong-item .ans-row { display: flex; gap: 8px; margin-top: 4px; align-items: center; flex-wrap: wrap; }
.wrong-item .your { color: var(--berry); text-decoration: line-through; }
.wrong-item .right { color: var(--leaf); font-weight: 700; }

.result-buttons { display: flex; gap: 10px; margin-top: 8px; }
.result-buttons .action-btn { margin-top: 0; }

footer { text-align: center; margin-top: 30px; font-size: 11px; color: #999; }
footer a { color: var(--leaf); text-decoration: none; }

.warn-box {
  background: #fff8e1; border: 2px solid #f4c43e;
  border-radius: 10px; padding: 10px 14px; font-size: 12px;
  color: #5a4500; margin-bottom: 12px; line-height: 1.5;
}
</style>
</head>
<body>
<div class="app">

<header>
  <h1 class="title">りかテスト</h1>
  <div class="subtitle">身近に見られる生物 〜じこさいてん〜</div>
</header>

<div class="start-screen" id="startScreen">
  <h2>🔬 もんだいの しゅるい</h2>

  <div class="handsfree-row" id="handsfreeRow">
    <div>
      <div class="label">🎤 ハンズフリーモード</div>
      <div class="desc">問題を読み上げて、声で答える</div>
    </div>
    <div class="switch" id="handsfreeSwitch"></div>
  </div>

  <div class="warn-box" id="voiceWarn" style="display:none">
    ⚠️ このブラウザは音声認識に対応していません。Safari か Chrome でひらいてください。
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="mix">ぜんぶ<br>ミックス</button>
    <button class="mode-btn" data-mode="family">名前→<br>〜科</button>
    <button class="mode-btn" data-mode="feature">特ちょう<br>→ 名前</button>
    <button class="mode-btn" data-mode="classify">名前→<br>分類</button>
  </div>
  <div class="mode-help">ミックスは「名前→科」「特ちょう→名前」「分類」をまぜて出します</div>

  <div class="section-list" id="sectionList"></div>
</div>

<div class="quiz-screen" id="quizScreen">
  <div class="quiz-header">
    <div class="progress"><span class="current" id="currentNum">1</span> / <span id="totalNum">10</span></div>
    <div class="score-display">⭐ <span id="scoreNum">0</span></div>
  </div>
  <div class="progress-bar"><div class="progress-bar-fill" id="progressFill" style="width: 0%"></div></div>

  <div class="question-card">
    <div class="q-type-badge" id="qTypeBadge"></div>
    <div class="control-row">
      <button class="speaker-btn" id="speakerBtn">🔊 もんだいを よむ</button>
      <button class="pause-btn" id="pauseBtn">⏸ 一時停止</button>
    </div>
    <div class="question-text" id="questionText"></div>

    <div class="voice-area" id="voiceArea" style="display:none">
      <button class="mic-btn" id="micBtn">🎤</button>
      <div class="mic-status" id="micStatus">マイクをタップして はなそう</div>
      <div class="heard-text empty" id="heardText">　</div>
    </div>

    <div id="textInputArea">
      <input type="text" class="answer-input" id="answerInput" placeholder="ここに かこう" autocomplete="off">
      <div class="hint" id="hintText"></div>
    </div>

    <div class="feedback" id="feedback">
      <div class="feedback-icon" id="feedbackIcon"></div>
      <div class="feedback-text" id="feedbackText"></div>
      <div class="feedback-answer" id="feedbackAnswer"></div>
      <div class="feedback-extra" id="feedbackExtra"></div>
      <div class="auto-next-info" id="autoNextInfo" style="display:none"></div>
    </div>

    <button class="action-btn" id="submitBtn">こたえあわせ</button>
    <button class="action-btn next" id="nextBtn" style="display:none">つぎへ →</button>
    <button class="action-btn skip" id="skipBtn">わからない…スキップ</button>
  </div>
</div>

<div class="result-screen" id="resultScreen">
  <div class="result-card">
    <span class="result-emoji" id="resultEmoji">🎉</span>
    <div class="result-title" id="resultTitle">よくできました！</div>
    <div class="result-score"><span id="finalScore">0</span><span class="denom">/<span id="finalTotal">10</span></span></div>
    <div class="result-percentage" id="resultPercentage">0%</div>

    <div class="wrong-list" id="wrongList" style="display:none">
      <h3>📝 まちがえた もんだい</h3>
      <div id="wrongItems"></div>
    </div>

    <div class="result-buttons">
      <button class="action-btn retry" id="retryBtn">もういちど</button>
      <button class="action-btn" id="homeBtn">トップへ</button>
    </div>
  </div>
</div>

<div class="paused-overlay" id="pausedOverlay">
  <div class="paused-box">
    <div class="pause-icon">⏸</div>
    <h2>一時停止中</h2>
    <p>もんだいの 読み上げと マイクを 止めています</p>
    <button class="action-btn next" id="resumeBtn">▶️ さいかい</button>
  </div>
</div>

<footer>
  身近に見られる生物（教科書 p.8〜9）<br>
  写真リンク: <a href="https://ja.wikipedia.org/" target="_blank">Wikipedia</a>
</footer>

</div>

<script>
const ORGANISMS = {
  "植物（草花）": [
    { name:"カタバミ", wiki:"カタバミ", family:"カタバミ科", classify:"被子植物", features:["黄色の花弁が5枚","田畑や庭、道ばたに見られる"], size:"高さ10〜30cm" },
    { name:"ナズナ", wiki:"ナズナ", family:"アブラナ科", classify:"被子植物", features:["白色の花弁が4枚","田畑やあれ地、道ばたに見られる"], size:"高さ10〜40cm" },
    { name:"ハコベ", wiki:"コハコベ", family:"ナデシコ科", classify:"被子植物", features:["2つに割れた白色の花弁が5枚","日当たりのよい場所に多い"], size:"高さ20〜40cm" },
    { name:"シロツメクサ", wiki:"シロツメクサ", family:"マメ科", classify:"被子植物", features:["白い小さな花が集まってつく","道ばたに見られ、牧草に利用される"], size:"高さ20〜30cm" },
    { name:"ヒメオドリコソウ", wiki:"ヒメオドリコソウ", family:"シソ科", classify:"被子植物", features:["赤紫色の唇形の花が輪生する","田畑やあれ地、道ばたに見られる"], size:"高さ10〜25cm" },
    { name:"ホトケノザ", wiki:"ホトケノザ_(シソ科)", family:"シソ科", classify:"被子植物", features:["紅紫色の唇形の花が輪生する","柄のない葉が茎を丸くとり囲む","畑や道ばたに見られる"], size:"高さ10〜30cm" },
    { name:"キュウリグサ", wiki:"キュウリグサ", family:"ムラサキ科", classify:"被子植物", features:["うす青色の花弁が5枚","葉はキュウリのにおいがする","畑や道ばたに見られる"], size:"高さ10〜30cm" },
    { name:"ドクダミ", wiki:"ドクダミ", family:"ドクダミ科", classify:"被子植物", features:["黄色の小さな花が集まってつく","においが強い","道ばたやあれ地に見られる"], size:"高さ15〜40cm" },
    { name:"スズメノカタビラ", wiki:"スズメノカタビラ", family:"イネ科", classify:"被子植物", features:["小さな花が集まってつく","田畑やあれ地、道ばたに見られる"], size:"高さ10〜25cm" },
    { name:"オオイヌノフグリ", wiki:"オオイヌノフグリ", family:"オオバコ科", classify:"被子植物", features:["青色の花弁が4枚","畑や道ばたに見られる"], size:"高さ15〜30cm" },
    { name:"オオバコ", wiki:"オオバコ", family:"オオバコ科", classify:"被子植物", features:["花はおもに夏に咲き、小さな花が集まってつく","田畑やあれ地、道ばたに見られる"], size:"高さ10〜20cm" },
    { name:"ツユクサ", wiki:"ツユクサ", family:"ツユクサ科", classify:"被子植物", features:["花はおもに夏に咲く","青色の花弁が2枚、白色の花弁が1枚","道ばたやあれ地に見られる"], size:"高さ20〜50cm" }
  ],
  "シダ・コケ植物": [

let voices = [];
function loadVoices() {
  voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ja'));
}

  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

let currentUtterance = null;
function speak(text, onEnd) {
  if (!('speechSynthesis' in window)) {
    if (onEnd) onEnd();
    return;
  }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ja-JP';
  u.rate = 1.05;
  u.pitch = 1.0;
  if (voices.length > 0) u.voice = voices[0];
  u.onend = () => {
    $('speakerBtn').classList.remove('playing');
    currentUtterance = null;
    if (onEnd) onEnd();
  };
  u.onerror = () => {
    $('speakerBtn').classList.remove('playing');
    currentUtterance = null;
    if (onEnd) onEnd();
  };
  currentUtterance = u;
  $('speakerBtn').classList.add('playing');
  speechSynthesis.speak(u);
}

function stopSpeak() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  $('speakerBtn').classList.remove('playing');
  currentUtterance = null;
}

const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;
let recognitionFinalText = '';     // 確定済みテキスト
let recognitionInterimText = '';   // 途中結果
let recognitionSilenceTimer = null; // 無音タイマー
let recognitionAlternatives = [];  // 候補

function initRecognition() {
  if (!SpeechRec) return false;
  recognition = new SpeechRec();
  recognition.lang = 'ja-JP';
  recognition.continuous = true;      // 連続認識ON
  recognition.interimResults = true;  // 途中結果も受け取る
  recognition.maxAlternatives = 5;

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    const altsByResult = [];

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const result = e.results[i];
      if (result.isFinal) {
        final += result[0].transcript;
        // 候補を保存
        const alts = [];
        for (let j = 0; j < result.length; j++) {
          alts.push(result[j].transcript);
        }
        altsByResult.push(alts);
      } else {
        interim += result[0].transcript;
      }
    }

    if (final) {
      recognitionFinalText += final;
      // 確定した候補をマージ
      if (altsByResult.length > 0) {
        // 最後の確定結果の候補を主候補に
        recognitionAlternatives = altsByResult[altsByResult.length - 1];
      }
    }
    recognitionInterimText = interim;

    const displayText = recognitionFinalText + (interim ? `（${interim}）` : '');
    $('heardText').textContent = displayText || '　';
    if (displayText.trim()) $('heardText').classList.remove('empty');

    // 無音タイマーをリセット
    if (recognitionSilenceTimer) {
      clearTimeout(recognitionSilenceTimer);
    }
    // 1.8秒無音が続いたら判定
    recognitionSilenceTimer = setTimeout(() => {
      finalizeRecognition();
    }, 1200);
  };

  recognition.onerror = (e) => {
    isListening = false;
    $('micBtn').classList.remove('listening');
    if (recognitionSilenceTimer) {
      clearTimeout(recognitionSilenceTimer);
      recognitionSilenceTimer = null;
    }
    if (e.error === 'no-speech') {
      $('micStatus').textContent = '🤔 聞こえなかった、もう一度タップしてね';
    } else if (e.error === 'not-allowed' || e.error === 'permission-denied') {
      $('micStatus').textContent = '⚠️ マイクの許可が必要です';
    } else if (e.error === 'aborted') {
      $('micStatus').textContent = 'マイクをタップして はなそう';
    } else {
      $('micStatus').textContent = `⚠️ エラー: ${e.error}`;
    }
  };

  recognition.onend = () => {
    isListening = false;
    $('micBtn').classList.remove('listening');
    // 自動終了したが、まだ判定していない場合は判定
    if (recognitionFinalText.trim() && !state.answered) {
      finalizeRecognition();
    }
  };

  return true;
}

// 認識結果の判定（無音タイマー or onend からトリガー）
function finalizeRecognition() {
  if (recognitionSilenceTimer) {
    clearTimeout(recognitionSilenceTimer);
    recognitionSilenceTimer = null;
  }
  if (state.answered) return;

  const finalText = recognitionFinalText.trim();
  if (!finalText) return;

  // 確定した最終テキスト + 候補で判定
  $('heardText').textContent = finalText;
  $('heardText').classList.remove('empty');
  $('micStatus').textContent = '聞きとり中…';

  // 候補リストに、確定テキスト全体も含める
  const candidates = [finalText, ...recognitionAlternatives];
  // 認識を止める
  if (recognition && isListening) {
    try { recognition.stop(); } catch(e) {}
  }
  checkVoiceAnswer(candidates);
}

function startListening() {
  if (!recognition) return;
  if (isListening) return;
  if (state.answered) return;
  try {
    // 認識状態をリセット
    recognitionFinalText = '';
    recognitionInterimText = '';
    recognitionAlternatives = [];
    if (recognitionSilenceTimer) {
      clearTimeout(recognitionSilenceTimer);
      recognitionSilenceTimer = null;
    }
    $('heardText').textContent = '　';
    $('heardText').classList.add('empty');
    recognition.start();
    isListening = true;
    $('micBtn').classList.add('listening');
    $('micStatus').textContent = '🎤 はなしてください…（ゆっくりでもOK）';
  } catch (e) {
    console.error(e);
  }
}

function stopListening() {
  if (recognitionSilenceTimer) {
    clearTimeout(recognitionSilenceTimer);
    recognitionSilenceTimer = null;
  }
  if (recognition && isListening) {
    try { recognition.stop(); } catch(e) {}
  }
}

function checkVoiceAnswer(alternatives) {
  const q = state.questions[state.currentIdx];
  let isCorrect = false;
  let matchedAnswer = '';

  for (const alt of alternatives) {
    const userNorm = normalize(alt);
    if (!userNorm) continue;
    for (const correctAlt of q.alts) {
      const correctNorm = normalize(correctAlt);
      // 完全一致
      if (correctNorm === userNorm) {
        isCorrect = true;
        matchedAnswer = alt;
        break;
      }
      // 答えがユーザー入力に含まれる（例: 「えーっと、被子植物です」→「被子植物」が含まれる）
      if (userNorm.includes(correctNorm) && correctNorm.length >= 2) {
        isCorrect = true;
        matchedAnswer = alt;
        break;
      }
      // ユーザー入力が答えに含まれる（短く言った場合）
      if (correctNorm.includes(userNorm) && userNorm.length >= 2 && userNorm.length >= correctNorm.length * 0.6) {
        isCorrect = true;
        matchedAnswer = alt;
        break;
      }
    }
    if (isCorrect) break;
  }
  judgeAnswer(isCorrect, matchedAnswer || alternatives[0], false);
}

function buildQuestions(items) {
  const out = [];
  items.forEach(o => {
    if (state.mode === 'mix' || state.mode === 'family') {
      const alts = READING_MAP[o.family] || [o.family, o.family.replace('科','')];
      out.push({ type: 'family', prompt: o.name, answer: o.family, alts, extra: o.classify, name: o.name, wiki: o.wiki });
    }
    if (state.mode === 'mix' || state.mode === 'feature') {
      const alts = READING_MAP[o.name] || [o.name];
      out.push({ type: 'feature', prompt: o.features, sizeHint: o.size, answer: o.name, alts, extra: `${o.family}・${o.classify}`, name: o.name, wiki: o.wiki });
    }
    if (state.mode === 'mix' || state.mode === 'classify') {
      const alts = READING_MAP[o.classify] || [o.classify];
      out.push({ type: 'classify', prompt: o.name, answer: o.classify, alts, extra: o.family, name: o.name, wiki: o.wiki });
    }
  });
  return out;
}

function startQuiz(sectionIdx) {
  if (state.handsfree && !recognition) {
    if (!initRecognition()) {
      alert('お使いのブラウザは音声認識に対応していません。Safari か Chrome でお試しください。');
      return;
    }
  }
  const targets = sectionIdx === -1 ? SECTIONS : [SECTIONS[sectionIdx]];
  let qs = [];
  targets.forEach(sec => { qs = qs.concat(buildQuestions(sec.items)); });
  state.questions = shuffle(qs);
  state.currentIdx = 0;
  state.score = 0;
  state.wrongs = [];
  state.answered = false;
  state.paused = false;
  $('startScreen').style.display = 'none';
  $('resultScreen').classList.remove('active');
  $('quizScreen').classList.add('active');

  if (state.handsfree) {
    $('voiceArea').style.display = 'block';
    $('textInputArea').style.display = 'none';
    $('submitBtn').style.display = 'none';
  } else {
    $('voiceArea').style.display = 'none';
    $('textInputArea').style.display = 'block';
  }

  renderQuestion();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getQuestionTextForSpeech(q) {
  if (q.type === 'family') {
    return `${q.prompt} は、なに科 でしょう。`;
  } else if (q.type === 'feature') {
    let text = 'つぎの 特徴 の しょくぶつ、または、いきもの は なに？　';
    text += q.prompt.join('。 ');
    text += `。 大きさは、${q.sizeHint}。`;
    return text;
  } else if (q.type === 'classify') {
    return `${q.prompt} の ぶんるい は、つぎの どれ？　被子植物、シダ植物、コケ植物、鳥、昆虫、甲殻類、環形動物、軟体動物。`;
  }
  return '';
}

function renderQuestion() {
  if (state.autoNextTimer) {
    clearTimeout(state.autoNextTimer);
    state.autoNextTimer = null;
  }
  stopSpeak();
  stopListening();

  const q = state.questions[state.currentIdx];

  $('currentNum').textContent = state.currentIdx + 1;
  $('totalNum').textContent = state.questions.length;
  $('scoreNum').textContent = state.score;
  $('progressFill').style.width = (state.currentIdx / state.questions.length * 100) + '%';

  const badge = $('qTypeBadge');
  badge.className = 'q-type-badge';

  if (q.type === 'family') {
    badge.classList.add('family');
    badge.textContent = '🌱 〜科 を こたえよう';
    $('questionText').innerHTML = `<span class="target-name">${q.prompt}</span> は なに科 でしょう？`;
    $('hintText').textContent = '「マメ」「マメ科」どちらでもOK';
  } else if (q.type === 'feature') {
    badge.classList.add('feature');
    badge.textContent = '🔍 特ちょう → 名前';
    const featureHtml = q.prompt.map(f => `<li>${f}</li>`).join('');
    $('questionText').innerHTML = `つぎの 特ちょう の しょくぶつ・生き物 は なに？<div class="feature-box"><ul>${featureHtml}</ul><div style="margin-top:6px;font-size:12px;color:#888">大きさ: ${q.sizeHint}</div></div>`;
    $('hintText').textContent = 'カタカナで かこう';
  } else if (q.type === 'classify') {
    badge.classList.add('classify');
    badge.textContent = '📚 ぶんるい は？';
    $('questionText').innerHTML = `<span class="target-name">${q.prompt}</span> は つぎの どれ？<div class="feature-box" style="border-color:var(--sky)"><div style="font-size:13px">被子植物 / シダ植物 / コケ植物 / 鳥 / 昆虫 / 甲殻類 / 環形動物 / 軟体動物</div></div>`;
    $('hintText').textContent = '上のリストから選んでね';
  }

  if (state.handsfree) {
    $('heardText').textContent = '　';
    $('heardText').classList.add('empty');
    $('micStatus').textContent = '🔊 よみあげ中…';
    speak(getQuestionTextForSpeech(q), () => {
      if (!state.answered && !state.paused) {
        $('micStatus').textContent = 'マイクをタップして はなそう';
        setTimeout(() => {
          if (!state.answered && !state.paused) startListening();
        }, 300);
      }
    });
  } else {
    const input = $('answerInput');
    input.value = '';
    input.disabled = false;
    input.classList.remove('correct', 'wrong');
    setTimeout(() => input.focus(), 100);
  }

  $('feedback').classList.remove('show', 'correct', 'wrong');
  $('autoNextInfo').style.display = 'none';
  $('submitBtn').style.display = state.handsfree ? 'none' : 'block';
  $('submitBtn').disabled = false;
  $('nextBtn').style.display = 'none';
  $('skipBtn').style.display = 'block';
  state.answered = false;
}

function normalize(s) {
  return s.trim()
    .replace(/\s+/g, '')
    .replace(/[ぁ-ゖ]/g, ch => String.fromCharCode(ch.charCodeAt(0) + 0x60))
    .replace(/[、。・]/g, '');
}

function checkAnswer(skipped = false) {
  if (state.answered) return;
  const q = state.questions[state.currentIdx];
  const userRaw = skipped ? '' : $('answerInput').value.trim();
  if (!skipped && !userRaw) { $('answerInput').focus(); return; }

  let isCorrect = false;
  if (!skipped) {
    const userNorm = normalize(userRaw);
    for (const alt of q.alts) {
      if (normalize(alt) === userNorm) { isCorrect = true; break; }
    }
  }
  judgeAnswer(isCorrect, userRaw, skipped);
}

function judgeAnswer(isCorrect, userRaw, skipped) {
  const q = state.questions[state.currentIdx];
  state.answered = true;
  stopListening();

  const input = $('answerInput');
  input.disabled = true;
  if (!skipped && !state.handsfree) input.classList.add(isCorrect ? 'correct' : 'wrong');

  const fb = $('feedback');
  fb.classList.add('show', isCorrect ? 'correct' : 'wrong');

  const extraHtml = (q.extra ? `（${q.extra}）` : '') + (q.wiki ? `<br><a href="https://ja.wikipedia.org/wiki/${encodeURIComponent(q.wiki)}" target="_blank" rel="noopener" class="wiki-link">📖 ${q.name} の写真をみる</a>` : '');

  if (isCorrect) {
    state.score++;
    $('scoreNum').textContent = state.score;
    $('feedbackIcon').textContent = '◯';
    $('feedbackText').textContent = 'せいかい！';
    $('feedbackAnswer').textContent = q.answer;
    $('feedbackExtra').innerHTML = extraHtml;
  } else {
    $('feedbackIcon').textContent = '✕';
    $('feedbackText').textContent = skipped ? 'こたえは…' : 'ざんねん…！ こたえは';
    $('feedbackAnswer').textContent = q.answer;
    $('feedbackExtra').innerHTML = extraHtml;
    state.wrongs.push({
      type: q.type,
      promptText: q.type === 'feature' ? q.prompt.join('／') : q.prompt,
      your: userRaw || '（スキップ）',
      correct: q.answer,
      name: q.name,
      wiki: q.wiki
    });
  }

  $('submitBtn').style.display = 'none';
  $('skipBtn').style.display = 'none';

  if (state.handsfree) {
    const isLast = state.currentIdx === state.questions.length-1;
    const feedbackText = isCorrect
      ? `せいかい！`
      : (skipped ? `答えは、${q.answer}。` : `ざんねん。答えは、${q.answer}。`);
    speak(feedbackText, () => {
      if (state.paused) return;
      $('autoNextInfo').style.display = 'block';
      $('autoNextInfo').textContent = isLast ? 'けっか へ…' : 'つぎへ…';
      state.autoNextTimer = setTimeout(() => {
        if (!state.paused) nextQuestion();
      }, 600);
    });
    setTimeout(() => {
      if (state.answered && state.autoNextTimer === null && !state.paused) {
        nextQuestion();
      }
    }, 8000);
  } else {
    $('nextBtn').style.display = 'block';
    $('nextBtn').textContent = state.currentIdx === state.questions.length-1 ? 'けっか を みる →' : 'つぎへ →';
    $('nextBtn').focus();
  }
}

function nextQuestion() {
  if (state.autoNextTimer) {
    clearTimeout(state.autoNextTimer);
    state.autoNextTimer = null;
  }
  state.currentIdx++;
  if (state.currentIdx >= state.questions.length) showResult();
  else renderQuestion();
}

function showResult() {
  stopSpeak();
  stopListening();
  if (state.autoNextTimer) {
    clearTimeout(state.autoNextTimer);
    state.autoNextTimer = null;
  }

  $('quizScreen').classList.remove('active');
  $('resultScreen').classList.add('active');

  const total = state.questions.length;
  const score = state.score;
  const pct = Math.round(score / total * 100);

  $('finalScore').textContent = score;
  $('finalTotal').textContent = total;
  $('resultPercentage').textContent = `せいかいりつ ${pct}%`;

  let emoji, title;
  if (pct === 100) { emoji = '🏆'; title = 'パーフェクト！博士級！'; }
  else if (pct >= 90) { emoji = '🌟'; title = 'すごい！'; }
  else if (pct >= 70) { emoji = '🌿'; title = 'よくできました！'; }
  else if (pct >= 50) { emoji = '🌱'; title = 'もう少し！'; }
  else { emoji = '📚'; title = 'もう一回チャレンジ！'; }

  $('resultEmoji').textContent = emoji;
  $('resultTitle').textContent = title;

  if (state.handsfree) {
    setTimeout(() => {
      speak(`${title}　${total}もん中、${score}もん せいかい！　せいかいりつ ${pct}パーセント。`);
    }, 300);
  }

  if (state.wrongs.length > 0) {
    $('wrongList').style.display = 'block';
    const items = $('wrongItems');
    items.innerHTML = '';
    state.wrongs.forEach(w => {
      const div = document.createElement('div');
      div.className = 'wrong-item';
      let typeLabel = '';
      if (w.type === 'family') typeLabel = '【〜科】';
      else if (w.type === 'feature') typeLabel = '【特ちょう→名前】';
      else if (w.type === 'classify') typeLabel = '【分類】';
      const wikiLink = w.wiki ? `<a href="https://ja.wikipedia.org/wiki/${encodeURIComponent(w.wiki)}" target="_blank" rel="noopener" style="font-size:11px;color:var(--leaf);text-decoration:none;margin-left:6px">📖写真</a>` : '';
      div.innerHTML = `
        <div class="q-text">${typeLabel} ${w.promptText}</div>
        <div class="ans-row">
          <span class="your">${w.your}</span>
          <span>→</span>
          <span class="right">${w.correct}</span>
          <span style="font-size:11px;color:#999">（${w.name}）</span>${wikiLink}
        </div>
      `;
      items.appendChild(div);
    });
  } else {
    $('wrongList').style.display = 'none';
  }
}

$('speakerBtn').addEventListener('click', () => {
  if (currentUtterance) {
    stopSpeak();
  } else {
    const q = state.questions[state.currentIdx];
    speak(getQuestionTextForSpeech(q));
  }
});

$('pauseBtn').addEventListener('click', () => {
  pauseQuiz();
});

$('resumeBtn').addEventListener('click', () => {
  resumeQuiz();
});

function pauseQuiz() {
  state.paused = true;
  stopSpeak();
  stopListening();
  if (state.autoNextTimer) {
    clearTimeout(state.autoNextTimer);
    state.autoNextTimer = null;
  }
  $('pausedOverlay').classList.add('show');
}

function resumeQuiz() {
  state.paused = false;
  $('pausedOverlay').classList.remove('show');
  // 答え合わせ済みなら次の問題へ、未回答なら現在の問題を再開
  if (state.answered) {
    nextQuestion();
  } else if (state.handsfree) {
    // ハンズフリーで未回答なら、問題を読み直してマイクを再起動
    const q = state.questions[state.currentIdx];
    $('micStatus').textContent = '🔊 よみあげ中…';
    speak(getQuestionTextForSpeech(q), () => {
      if (!state.answered && !state.paused) {
        $('micStatus').textContent = 'マイクをタップして はなそう';
        setTimeout(() => {
          if (!state.answered && !state.paused) startListening();
        }, 300);
      }
    });
  }
}

$('micBtn').addEventListener('click', () => {
  if (isListening) {
    stopListening();
  } else {
    // 読み上げ中ならまず止めてから、少し待ってマイク起動
    if (currentUtterance) {
      stopSpeak();
      setTimeout(() => {
        if (!state.answered && !state.paused) startListening();
      }, 200);
    } else {
      startListening();
    }
  }
});

$('submitBtn').addEventListener('click', () => checkAnswer(false));
$('skipBtn').addEventListener('click', () => {
  stopListening();
  if (state.handsfree) {
    judgeAnswer(false, '', true);
  } else {
    checkAnswer(true);
  }
});
$('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (state.answered) nextQuestion();
    else checkAnswer(false);
  }
});
$('nextBtn').addEventListener('click', nextQuestion);
$('retryBtn').addEventListener('click', () => {
  $('resultScreen').classList.remove('active');
  state.questions = shuffle(state.questions);
  state.currentIdx = 0;
  state.score = 0;
  state.wrongs = [];
  $('quizScreen').classList.add('active');
  renderQuestion();
});
$('homeBtn').addEventListener('click', () => {
  stopSpeak();
  $('resultScreen').classList.remove('active');
  $('startScreen').style.display = 'block';
  renderSectionList();
});

renderSectionList();

// ページが非表示→表示に戻った時に、マイク状態をリセット
// (Wikipedia等の別タブから戻った時のマイク不調を防ぐ)
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    if (isListening) {
      try { recognition.stop(); } catch(e) {}
      isListening = false;
      $('micBtn').classList.remove('listening');
    }
    if (recognitionSilenceTimer) {
      clearTimeout(recognitionSilenceTimer);
      recognitionSilenceTimer = null;
    }
    if (state.handsfree && !state.answered && !state.paused
        && $('quizScreen').classList.contains('active')) {
      $('micStatus').textContent = 'マイクをタップして はなそう';
    }
  } else {
    stopSpeak();
    if (recognition && isListening) {
      try { recognition.stop(); } catch(e) {}
    }
  }
});

// 外部リンクをタップした時の事前停止
document.addEventListener('click', (e) => {
  const target = e.target.closest('a[target="_blank"]');
  if (target) {
    stopSpeak();
    if (recognition && isListening) {
      try { recognition.stop(); } catch(e) {}
    }
    if (recognitionSilenceTimer) {
      clearTimeout(recognitionSilenceTimer);
      recognitionSilenceTimer = null;
    }
  }
}, true);
</script>
